<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>分層建築物所有人大會會議管理系統 (單機測試版)</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 8px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
    @media print {
      body * { visibility: hidden; }
      #print-report-container, #print-report-container * { visibility: visible; }
      #print-report-container { position: absolute; left: 0; top: 0; width: 100%; padding: 20px; }
    }
  </style>
</head>
<body class="bg-slate-100 text-slate-800">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // --- 圖示庫壓縮版 ---
    const I = ({ p, c = "w-6 h-6" }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={c} dangerouslySetInnerHTML={{__html: p}} />;
    const Users = (props) => <I {...props} p='<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>' />;
    const ClipboardCheck = (props) => <I {...props} p='<rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="m9 14 2 2 4-4"/>' />;
    const FileText = (props) => <I {...props} p='<path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/>' />;
    const AlertCircle = (props) => <I {...props} p='<circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/>' />;
    const CheckCircle = (props) => <I {...props} p='<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/>' />;
    const XCircle = (props) => <I {...props} p='<circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/>' />;
    const Info = (props) => <I {...props} p='<circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/>' />;
    const BarChart3 = (props) => <I {...props} p='<path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/>' />;
    const Settings = (props) => <I {...props} p='<path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>' />;
    const LogOut = (props) => <I {...props} p='<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/>' />;
    const Play = (props) => <I {...props} p='<polygon points="5 3 19 12 5 21 5 3"/>' />;
    const Square = (props) => <I {...props} p='<rect width="18" height="18" x="3" y="3" rx="2" ry="2"/>' />;
    const Plus = (props) => <I {...props} p='<path d="M5 12h14"/><path d="M12 5v14"/>' />;
    const ShieldCheck = (props) => <I {...props} p='<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m9 12 2 2 4-4"/>' />;
    const ArrowLeft = (props) => <I {...props} p='<path d="m12 19-7-7 7-7"/><path d="M19 12H5"/>' />;
    const Trash2 = (props) => <I {...props} p='<path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/>' />;
    const BookOpen = (props) => <I {...props} p='<path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>' />;
    const FileSpreadsheet = (props) => <I {...props} p='<path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="M8 13h2"/><path d="M8 17h2"/><path d="M14 13h2"/><path d="M14 17h2"/>' />;
    const ExternalLink = (props) => <I {...props} p='<path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" x2="21" y1="14" y2="3"/>' />;
    const UserSquare2 = (props) => <I {...props} p='<rect width="18" height="18" x="3" y="3" rx="2"/><circle cx="12" cy="10" r="3"/><path d="M7 21v-2a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v2"/>' />;
    const Lock = (props) => <I {...props} p='<rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>' />;
    const Printer = (props) => <I {...props} p='<polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/>' />;

    const thresholdRules = {
      'general_15': { label: '一般決議', desc: '贊成 > 反對，且贊成份額 ≥ 15% (根據第14/2017號法律第29條第1款)' },
      'special_25': { label: '特別決議', desc: '贊成 > 反對，且贊成份額 ≥ 25% (根據第14/2017號法律第29條第2款)' },
      'special_50': { label: '過半數決議', desc: '贊成份額 > 50% (根據第14/2017號法律第29條第3款)' },
      'special_66': { label: '更新工程', desc: '贊成份額 ≥ 2/3 [約66.67%] (根據第14/2017號法律第29條第4款)' }
    };

    // 備用初始資料
    const fallbackUnits = [
      { id: 'U01', unit: '1-A', owner: '陳大文', valuePercent: 12.5, status: 'absent', proxyType: 'none', proxyToOwnerId: '', proxyNonOwner: { name: '', idCard: '', phone: '' }, isConfirmed: false, ownerIdCardLast4: '' },
      { id: 'U02', unit: '1-B', owner: '李小萍', valuePercent: 12.5, status: 'absent', proxyType: 'none', proxyToOwnerId: '', proxyNonOwner: { name: '', idCard: '', phone: '' }, isConfirmed: false, ownerIdCardLast4: '' },
      { id: 'U03', unit: '2-A', owner: '王建國', valuePercent: 15.0, status: 'absent', proxyType: 'none', proxyToOwnerId: '', proxyNonOwner: { name: '', idCard: '', phone: '' }, isConfirmed: false, ownerIdCardLast4: '' }
    ];

    function MacauCondoMeeting() {
      const [currentView, setCurrentView] = useState('home'); 
      const [currentUser, setCurrentUser] = useState(null); 

      // 本地單機狀態管理
      const [meetingStatus, setMeetingStatus] = useState('pending');
      const [units, setUnits] = useState(fallbackUnits);
      const [agendas, setAgendas] = useState([]);
      const [votes, setVotes] = useState({});
      
      const [adminTab, setAdminTab] = useState('registry');
      const [userSelectedAgenda, setUserSelectedAgenda] = useState(null);
      const [loginModal, setLoginModal] = useState({ isOpen: false, targetId: null, type: '', name: '' });
      const [loginPin, setLoginPin] = useState('');
      const [loginError, setLoginError] = useState('');
      const [showReport, setShowReport] = useState(false); 

      const [newUnitData, setNewUnitData] = useState({ unit: '', owner: '', valuePercent: '' });
      const [newAgendaTitle, setNewAgendaTitle] = useState('');
      const [newAgendaType, setNewAgendaType] = useState('general_15');
      const fileInputRef = useRef(null);

      // --- 計算屬性 ---
      const attendanceStats = useMemo(() => {
        let confirmedPercent = 0;
        let confirmedCount = 0;
        units.forEach(u => {
          if (u.isConfirmed && u.status !== 'absent') {
            confirmedCount++;
            confirmedPercent += u.valuePercent;
          }
        });
        return {
          confirmedCount,
          confirmedPercent: confirmedPercent.toFixed(2),
          canHoldMeeting: confirmedPercent >= 15 
        };
      }, [units]);

      const confirmedNonOwnerProxies = useMemo(() => {
        const proxies = [];
        const map = new Set();
        units.forEach(u => {
          if (u.status === 'proxy' && u.proxyType === 'non_owner' && u.isConfirmed && u.proxyNonOwner?.idCard) {
            if (!map.has(u.proxyNonOwner.idCard)) {
              map.add(u.proxyNonOwner.idCard);
              proxies.push(u.proxyNonOwner);
            }
          }
        });
        return proxies;
      }, [units]);

      const getAgendaStats = (agendaId) => {
        const agendaVotes = votes[agendaId] || {};
        const agendaDef = agendas.find(a => a.id === agendaId);
        if (!agendaDef) return null;

        let forPercent = 0, againstPercent = 0, abstainPercent = 0;
        units.filter(u => u.isConfirmed && u.status !== 'absent').forEach(u => {
          const v = agendaVotes[u.id];
          if (v === 'for') forPercent += u.valuePercent;
          else if (v === 'against') againstPercent += u.valuePercent;
          else if (v === 'abstain') abstainPercent += u.valuePercent;
        });

        let isPassed = false;
        if (agendaDef.type === 'general_15') isPassed = (forPercent > againstPercent) && (forPercent >= 15);
        else if (agendaDef.type === 'special_25') isPassed = (forPercent > againstPercent) && (forPercent >= 25);
        else if (agendaDef.type === 'special_50') isPassed = forPercent > 50;
        else if (agendaDef.type === 'special_66') isPassed = forPercent >= (200 / 3);

        return {
          forPercent: forPercent.toFixed(2),
          againstPercent: againstPercent.toFixed(2),
          abstainPercent: abstainPercent.toFixed(2),
          isPassed,
          rule: thresholdRules[agendaDef.type]
        };
      };

      const controlledUnits = useMemo(() => {
        if (currentView !== 'user' || !currentUser) return [];
        if (currentUser.startsWith('PROXY_')) {
          const idCard = currentUser.replace('PROXY_', '');
          return units.filter(u => u.isConfirmed && u.status === 'proxy' && u.proxyType === 'non_owner' && u.proxyNonOwner.idCard === idCard);
        } else {
          return units.filter(u => {
            if (!u.isConfirmed) return false;
            if (u.id === currentUser && u.status === 'present') return true;
            if (u.status === 'proxy' && u.proxyType === 'owner' && u.proxyToOwnerId === currentUser) return true;
            return false;
          });
        }
      }, [currentUser, units, currentView]);

      // --- 操作事件 ---
      const handleBackToHome = () => { setCurrentView('home'); setCurrentUser(null); setShowReport(false); };

      const handleOpenLogin = (id, type, name) => {
        setLoginModal({ isOpen: true, targetId: id, type, name });
        setLoginPin(''); setLoginError('');
      };

      const handleLoginSubmit = () => {
        if (loginModal.type === 'owner') {
          const unit = units.find(u => u.id === loginModal.targetId);
          if (!unit.isConfirmed) { setLoginError('尚未經管委會核實'); return; }
          if (!unit.ownerIdCardLast4 || loginPin !== unit.ownerIdCardLast4) { setLoginError('密碼錯誤'); return; }
          setCurrentUser(unit.id); setCurrentView('user');
        } else {
          const proxy = confirmedNonOwnerProxies.find(p => p.idCard === loginModal.targetId);
          if (!proxy || loginPin !== proxy.idCard.slice(-4)) { setLoginError('密碼錯誤'); return; }
          setCurrentUser(`PROXY_${proxy.idCard}`); setCurrentView('user');
        }
        setUserSelectedAgenda(agendas[0]?.id);
        setLoginModal({ isOpen: false, targetId: null, type: '', name: '' });
      };

      const handleShowReport = () => {
        setMeetingStatus('ended');
        setTimeout(() => { setShowReport(true); }, 500);
      };

      const handlePrint = () => { window.print(); };

      const clearDatabase = () => {
        if(!confirm('警告：確定要刪除所有資料嗎？此操作無法復原。')) return;
        setUnits([]);
        setAgendas([]);
        setVotes({});
        setMeetingStatus('pending');
        alert("資料已清空！");
        setShowReport(false);
      };

      const handleAddUnit = () => {
        if (!newUnitData.unit) return;
        const newId = 'U' + Date.now();
        const data = { 
          id: newId,
          unit: newUnitData.unit, owner: newUnitData.owner, valuePercent: parseFloat(newUnitData.valuePercent) || 0, 
          status: 'absent', proxyType: 'none', proxyToOwnerId: '', proxyNonOwner: { name: '', idCard: '', phone: '' }, isConfirmed: false, ownerIdCardLast4: '' 
        };
        setUnits(prev => [...prev, data]);
        setNewUnitData({ unit: '', owner: '', valuePercent: '' });
      };

      const handleDeleteUnit = (id) => {
        setUnits(prev => prev.filter(u => u.id !== id));
      };

      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
          const text = evt.target.result;
          const rows = text.split('\n');
          const newUnits = [];
          rows.forEach((row, index) => {
            if (index === 0 || !row.trim()) return; 
            const cols = row.split(',');
            if (cols.length >= 3) {
              newUnits.push({
                id: 'U' + Date.now() + index, unit: cols[0].trim(), owner: cols[1].trim(),
                valuePercent: parseFloat(cols[2].trim()) || 0,
                status: 'absent', proxyType: 'none', proxyToOwnerId: '', proxyNonOwner: { name: '', idCard: '', phone: '' }, isConfirmed: false, ownerIdCardLast4: ''
              });
            }
          });
          if(newUnits.length > 0) {
            setUnits(prev => [...prev, ...newUnits]);
            alert(`成功匯入 ${newUnits.length} 筆業主資料！`);
          }
        };
        reader.readAsText(file);
        e.target.value = null; 
      };

      const handleUnitUpdateCloud = (id, field, value) => {
        setUnits(prev => prev.map(u => {
          if (u.id === id) {
            const updated = { ...u, [field]: value };
            if (field === 'status') {
              updated.isConfirmed = false;
              if (value === 'absent') { updated.proxyType = 'none'; updated.ownerIdCardLast4 = ''; }
              else if (value === 'proxy' && updated.proxyType === 'none') { updated.proxyType = 'owner'; }
            }
            if (field === 'proxyType' || field === 'proxyToOwnerId') updated.isConfirmed = false;
            return updated;
          }
          return u;
        }));
      };

      const handleNonOwnerProxyUpdateCloud = (id, field, value) => {
        setUnits(prev => prev.map(u => u.id === id ? { ...u, proxyNonOwner: { ...u.proxyNonOwner, [field]: value }, isConfirmed: false } : u));
      };

      const handleAddAgenda = () => {
        if (!newAgendaTitle.trim()) return;
        const newId = 'A' + Date.now();
        setAgendas(prev => [...prev, { id: newId, title: newAgendaTitle, type: newAgendaType }]);
        setNewAgendaTitle('');
      };

      const handleVote = (agendaId, unitId, voteType) => {
        if (meetingStatus !== 'started') return;
        setVotes(prev => ({
          ...prev,
          [agendaId]: {
            ...(prev[agendaId] || {}),
            [unitId]: voteType
          }
        }));
      };

      const TopNavBar = ({ title, subtitle, icon: IconComponent, showAdminStats }) => (
        <header className="bg-slate-800 text-white p-4 shadow-md sticky top-0 z-10 no-print">
          <div className="max-w-6xl mx-auto flex flex-wrap items-center justify-between gap-4">
            <div className="flex items-center gap-3">
              <IconComponent className="w-6 h-6 text-blue-400" />
              <div>
                <h1 className="text-lg font-bold">{title}</h1>
                <p className="text-xs text-slate-300">{subtitle}</p>
              </div>
            </div>
            <div className="flex items-center gap-4">
              {showAdminStats && (
                <div className="hidden md:block bg-slate-700 px-4 py-1.5 rounded-lg border border-slate-600 text-sm">
                  已確認出席：<span className={`text-lg font-bold ${attendanceStats.canHoldMeeting ? 'text-green-400' : 'text-red-400'}`}>{attendanceStats.confirmedPercent}%</span>
                </div>
              )}
              <button onClick={handleBackToHome} className="flex items-center gap-2 px-3 py-1.5 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm font-medium transition-colors border border-slate-600">
                <ArrowLeft className="w-4 h-4" /> 回首頁
              </button>
            </div>
          </div>
        </header>
      );

      const ProgressBar = ({ forP, againstP, abstainP }) => (
        <div className="flex h-3 w-full bg-slate-200 rounded-full overflow-hidden mt-1">
          <div style={{ width: `${Math.min(forP, 100)}%` }} className="bg-green-500 transition-all"></div>
          <div style={{ width: `${Math.min(againstP, 100)}%` }} className="bg-red-500 transition-all"></div>
          <div style={{ width: `${Math.min(abstainP, 100)}%` }} className="bg-slate-400 transition-all"></div>
        </div>
      );

      // --- 視圖 1: 首頁 ---
      if (currentView === 'home') {
        return (
          <div className="min-h-screen bg-slate-100 flex flex-col items-center justify-center p-4">
            <div className="absolute top-4 right-4">
              <button onClick={() => setCurrentView('law')} className="flex items-center gap-2 bg-white text-blue-700 px-4 py-2 rounded-full shadow-sm font-bold border border-blue-200">
                <BookOpen className="w-5 h-5" /> 相關法律
              </button>
            </div>
            <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md my-8 border-t-4 border-blue-600">
              <div className="text-center mb-6">
                <div className="bg-blue-600 p-3 rounded-full inline-block mb-3 shadow-md"><Users className="w-8 h-8 text-white" /></div>
                <h1 className="text-2xl font-bold text-slate-800">分層建築物所有人大會<br/>單機會議系統</h1>
                <p className="text-slate-500 text-sm mt-2">依據《第14/2017號法律》標準</p>
                <p className="text-xs text-amber-600 font-bold mt-2">● 目前為前端單機測試模式 (無雲端連線)</p>
              </div>

              {/* 首頁法律提示 */}
              <div className="bg-amber-50 border border-amber-200 text-amber-800 p-3 rounded-lg text-xs mb-6 text-left shadow-sm">
                <p className="font-bold mb-1 flex items-center gap-1"><AlertCircle className="w-4 h-4" /> 【法律聲明】第14/2017號法律</p>
                <ul className="list-disc pl-4 space-y-1 mt-2">
                  <li>會議出席及投票僅限業主、已登記用益權人或預約取得人(或其合法授權人)。</li>
                  <li>登入即表示您同意本系統依據上述法律進行身份核實與選票記錄。</li>
                </ul>
              </div>

              <div className="space-y-4">
                <button onClick={() => { setCurrentView('admin'); setAdminTab('registry'); }} className="w-full py-4 px-4 bg-slate-800 text-white rounded-xl font-bold flex justify-center gap-2">
                  <Settings className="w-5 h-5" /> 管委會登入 (管理員)
                </button>
                <div className="relative flex items-center py-4">
                  <div className="flex-grow border-t"></div><span className="mx-4 text-slate-500 text-sm font-bold">一般業主登入</span><div className="flex-grow border-t"></div>
                </div>
                <div className="max-h-[200px] overflow-y-auto grid grid-cols-2 gap-3 custom-scrollbar pr-2">
                  {units.length === 0 && <p className="col-span-2 text-center text-sm text-slate-400 py-2">請先透過管委會建立名冊</p>}
                  {units.map(u => (
                    <button key={u.id} onClick={() => handleOpenLogin(u.id, 'owner', `${u.unit} ${u.owner}`)} className="py-3 px-2 bg-blue-50 text-blue-800 rounded-lg text-sm font-semibold border border-blue-200 hover:bg-blue-100 transition-colors">
                      {u.unit} <br/><span className="font-normal text-xs text-blue-600">{u.owner}</span>
                    </button>
                  ))}
                </div>
                {confirmedNonOwnerProxies.length > 0 && (
                  <>
                    <div className="relative flex items-center py-4">
                      <div className="flex-grow border-t"></div><span className="mx-4 text-slate-500 text-sm font-bold">非業主代理人登入</span><div className="flex-grow border-t"></div>
                    </div>
                    <div className="grid grid-cols-1 gap-2">
                      {confirmedNonOwnerProxies.map(proxy => (

              {meetingStatus === 'started' && (
                <>
                  <div className="bg-amber-50 border border-amber-200 text-amber-800 p-4 rounded-xl text-sm mb-6 flex gap-3 shadow-sm">
                    <AlertCircle className="w-6 h-6 shrink-0 mt-0.5" />
                    <div>
                      <p className="font-bold mb-1 text-base">【依法行使表決權須知】</p>
                      <p className="leading-relaxed">根據《第14/2017號法律》，您的選票（含委託代投）將按所佔樓宇份額加權計算，並直接影響大會決議是否達法定門檻。請謹慎作答，一旦大會結束並鎖定，決議即對全體業主具備法律約束力。</p>
                    </div>
                  </div>

                  {agendas.map((agenda, idx) => {
                    const stats = getAgendaStats(agenda.id);
                    return (
                      <div key={agenda.id} className="bg-white border rounded-xl shadow-md overflow-hidden mb-6">
                        <div className="bg-slate-50 p-5 border-b">
                          <div className="font-bold text-xs text-blue-600 mb-1">議程 {idx + 1}</div>
                          <h2 className="text-xl font-bold text-slate-800">{agenda.title}</h2>
                          <p className="text-sm text-slate-600 mt-2 bg-white px-3 py-1.5 border rounded-lg inline-block"><strong>要求：</strong>{stats.rule.desc}</p>
                        </div>
                        <div className="p-5 space-y-4">
                          {controlledUnits.map(unit => {
                            const currentVote = votes[agenda.id]?.[unit.id];
                            return (
                              <div key={unit.id} className="flex flex-col md:flex-row md:items-center justify-between bg-slate-50 p-4 rounded-lg border gap-4 hover:border-blue-300 transition-colors">
                                <div>
                                  <div className="font-bold text-slate-800 text-lg">{unit.unit}</div>
                                  <div className="text-sm text-slate-500 mt-0.5">{unit.owner} <span className="font-mono text-blue-600 bg-blue-100 px-1.5 py-0.5 rounded text-xs ml-1">{unit.valuePercent}%</span></div>
                                </div>
                                <div className="flex gap-2 w-full md:w-auto">
                                  <button onClick={() => handleVote(agenda.id, unit.id, 'for')} className={`flex-1 md:w-24 py-2.5 rounded-lg font-bold border transition-colors shadow-sm ${currentVote==='for'?'bg-green-600 text-white border-green-600':'bg-white text-slate-600 hover:bg-green-50 hover:text-green-700 hover:border-green-300'}`}>贊成</button>
                                  <button onClick={() => handleVote(agenda.id, unit.id, 'against')} className={`flex-1 md:w-24 py-2.5 rounded-lg font-bold border transition-colors shadow-sm ${currentVote==='against'?'bg-red-600 text-white border-red-600':'bg-white text-slate-600 hover:bg-red-50 hover:text-red-700 hover:border-red-300'}`}>反對</button>
                                  <button onClick={() => handleVote(agenda.id, unit.id, 'abstain')} className={`flex-1 md:w-24 py-2.5 rounded-lg font-bold border transition-colors shadow-sm ${currentVote==='abstain'?'bg-slate-600 text-white border-slate-600':'bg-white text-slate-600 hover:bg-slate-100 hover:text-slate-800 hover:border-slate-400'}`}>棄權</button>
                                </div>
                              </div>
                            )
                          })}
                        </div>
                        <div className="bg-slate-50 p-5 border-t">
                          <h3 className="font-bold text-sm text-slate-500 mb-3 uppercase tracking-wider">全場實時點票</h3>
                          <div className="flex justify-between text-sm font-bold mb-2">
                            <span className="text-green-700">贊成: {stats.forPercent}%</span>
                            <span className="text-red-700">反對: {stats.againstPercent}%</span>
                          </div>
                          <ProgressBar forP={stats.forPercent} againstP={stats.againstPercent} abstainP={stats.abstainPercent} />
                          <div className={`mt-4 p-2.5 rounded-lg text-center font-bold text-sm border ${stats.isPassed ? 'bg-green-100 text-green-800 border-green-300' : 'bg-slate-200 text-slate-600 border-slate-300'}`}>
                            {stats.isPassed ? '預測：目前票數已達法定通過要求' : '預測：目前票數未達法定要求'}
                          </div>
                        </div>
                      </div>
                    )
                  })}
                </>
              )}
            </div>
          </div>
        );
      }

      return null;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MacauCondoMeeting />);
  </script>
</body>
</html>
