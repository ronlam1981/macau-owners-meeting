  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // --- 圖示庫 ---
    const I = ({ p, c = "w-6 h-6" }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={c} dangerouslySetInnerHTML={{__html: p}} />;
    const Users = (props) => <I {...props} p='<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>' />;
    const ClipboardCheck = (props) => <I {...props} p='<rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="m9 14 2 2 4-4"/>' />;
    const FileText = (props) => <I {...props} p='<path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/>' />;

    const XCircle = (props) => <I {...props} p='<circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/>' />;
    const Info = (props) => <I {...props} p='<circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/>' />;

    const Settings = (props) => <I {...props} p='<path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>' />;
    const LogOut = (props) => <I {...props} p='<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/>' />;

    const ArrowLeft = (props) => <I {...props} p='<path d="m12 19-7-7 7-7"/><path d="M19 12H5"/>' />;

    const BookOpen = (props) => <I {...props} p='<path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>' />;
    const FileSpreadsheet = (props) => <I {...props} p='<path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="M8 13h2"/><path d="M8 17h2"/><path d="M14 13h2"/><path d="M14 17h2"/>' />;
    const ExternalLink = (props) => <I {...props} p='<path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" x2="21" y1="14" y2="3"/>' />;
    const UserSquare2 = (props) => <I {...props} p='<rect width="18" height="18" x="3" y="3" rx="2"/><circle cx="12" cy="10" r="3"/><path d="M7 21v-2a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v2"/>' />;
    const Lock = (props) => <I {...props} p='<rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>' />;
    const Printer = (props) => <I {...props} p='<polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/>' />;
    const ListOrdered = (props) => <I {...props} p='<line x1="10" x2="21" y1="6" y2="6"/><line x1="10" x2="21" y1="12" y2="12"/><line x1="10" x2="21" y1="18" y2="18"/><path d="M4 6h1v4"/><path d="M4 10h2"/><path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1"/>' />;
    const Clock = (props) => <I {...props} p='<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>' />;
    const Star = (props) => <I {...props} p='<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>' />;

    const thresholdRules = {
      'general_15': { label: '一般決議', desc: '贊成 > 反對，且贊成份額 ≥ 15% (第14/2017號法律第29條第1款)' },
      'special_25': { label: '特別決議', desc: '贊成 > 反對，且贊成份額 ≥ 25% (第14/2017號法律第29條第2款)' },
      'special_50': { label: '過半數決議', desc: '贊成份額 > 50% (第14/2017號法律第29條第3款)' },
      'special_66': { label: '更新工程', desc: '贊成份額 ≥ 2/3 [約66.67%] (第14/2017號法律第29條第4款)' }
    };

    // =========================================================================
    // 💡 預載入 12 筆測試數據 (總和 100%) - 加入小明並預設為熱門受託人
    // =========================================================================
    const initialMockUnits = [
      { id: 'U1', tower: 'A座', unit: '1-A', owner: '小明 (管委會主席)', valuePercent: 10, seqNo: 'A座-001', isPriorityProxy: true, status: 'absent', proxyType: 'none', proxyToOwnerId: '', proxyNonOwner: { name: '', idCard: '', phone: '' }, isConfirmed: false, ownerIdCardLast4: '' },
      { id: 'U2', tower: 'A座', unit: '1-B', owner: '李小萍', valuePercent: 8, seqNo: 'A座-002', isPriorityProxy: false, status: 'absent', proxyType: 'none', proxyToOwnerId: '', proxyNonOwner: { name: '', idCard: '', phone: '' }, isConfirmed: false, ownerIdCardLast4: '' },
      { id: 'U3', tower: 'A座', unit: '2-A', owner: '王建國', valuePercent: 12, seqNo: 'A座-003', isPriorityProxy: false, status: 'absent', proxyType: 'none', proxyToOwnerId: '', proxyNonOwner: { name: '', idCard: '', phone: '' }, isConfirmed: false, ownerIdCardLast4: '' },
      { id: 'U4', tower: 'A座', unit: '2-B', owner: '林美麗', valuePercent: 5, seqNo: 'A座-004', isPriorityProxy: false, status: 'absent', proxyType: 'none', proxyToOwnerId: '', proxyNonOwner: { name: '', idCard: '', phone: '' }, isConfirmed: false, ownerIdCardLast4: '' },
      { id: 'U5', tower: 'A座', unit: '3-A', owner: '張志強', valuePercent: 10, seqNo: 'A座-005', isPriorityProxy: false, status: 'absent', proxyType: 'none', proxyToOwnerId: '', proxyNonOwner: { name: '', idCard: '', phone: '' }, isConfirmed: false, ownerIdCardLast4: '' },
      { id: 'U6', tower: 'A座', unit: '3-B', owner: '劉德華', valuePercent: 5, seqNo: 'A座-006', isPriorityProxy: false, status: 'absent', proxyType: 'none', proxyToOwnerId: '', proxyNonOwner: { name: '', idCard: '', phone: '' }, isConfirmed: false, ownerIdCardLast4: '' },
      { id: 'U7', tower: 'B座', unit: '1-A', owner: '何婉玲', valuePercent: 15, seqNo: 'B座-001', isPriorityProxy: false, status: 'absent', proxyType: 'none', proxyToOwnerId: '', proxyNonOwner: { name: '', idCard: '', phone: '' }, isConfirmed: false, ownerIdCardLast4: '' },
      { id: 'U8', tower: 'B座', unit: '1-B', owner: '周家輝', valuePercent: 5, seqNo: 'B座-002', isPriorityProxy: false, status: 'absent', proxyType: 'none', proxyToOwnerId: '', proxyNonOwner: { name: '', idCard: '', phone: '' }, isConfirmed: false, ownerIdCardLast4: '' },
      { id: 'U9', tower: 'B座', unit: '2-A', owner: '吳淑芬', valuePercent: 10, seqNo: 'B座-003', isPriorityProxy: false, status: 'absent', proxyType: 'none', proxyToOwnerId: '', proxyNonOwner: { name: '', idCard: '', phone: '' }, isConfirmed: false, ownerIdCardLast4: '' },
      { id: 'U10', tower: 'B座', unit: '2-B', owner: '黃建明', valuePercent: 8, seqNo: 'B座-004', isPriorityProxy: false, status: 'absent', proxyType: 'none', proxyToOwnerId: '', proxyNonOwner: { name: '', idCard: '', phone: '' }, isConfirmed: false, ownerIdCardLast4: '' },
      { id: 'U11', tower: 'B座', unit: '3-A', owner: '鄭嘉欣', valuePercent: 7, seqNo: 'B座-005', isPriorityProxy: false, status: 'absent', proxyType: 'none', proxyToOwnerId: '', proxyNonOwner: { name: '', idCard: '', phone: '' }, isConfirmed: false, ownerIdCardLast4: '' },
      { id: 'U12', tower: 'B座', unit: '3-B', owner: '郭富城', valuePercent: 5, seqNo: 'B座-006', isPriorityProxy: false, status: 'absent', proxyType: 'none', proxyToOwnerId: '', proxyNonOwner: { name: '', idCard: '', phone: '' }, isConfirmed: false, ownerIdCardLast4: '' }
    ];

    const initialMockAgendas = [
      { id: 'A1', title: '是否同意今次大會使用電子投票方式', type: 'general_15', status: 'pending' },
      { id: 'A2', title: '選舉大會主席', type: 'general_15', status: 'pending' },
      { id: 'A3', title: '討論及通過分層建築物規章', type: 'special_50', status: 'pending' },
      { id: 'A4', title: '選舉管理機關成員', type: 'general_15', status: 'pending' },
      { id: 'A5', title: '討論及通過本年度預算', type: 'general_15', status: 'pending' }
    ];

    // --- 計時器小組件 ---
    const LiveTimer = ({ startTime }) => {
        const [now, setNow] = useState(Date.now());
        useEffect(() => {
            const interval = setInterval(() => setNow(Date.now()), 1000);
            return () => clearInterval(interval);
        }, []);
        if (!startTime) return <span>00:00</span>;
        const diff = Math.max(0, Math.floor((now - startTime) / 1000));
        const m = Math.floor(diff / 60).toString().padStart(2, '0');
        const s = (diff % 60).toString().padStart(2, '0');
        return <span>{m}:{s}</span>;
    };

    function MacauCondoMeeting() {
      const [currentSysTime, setCurrentSysTime] = useState(new Date());
      useEffect(() => {
        const timer = setInterval(() => setCurrentSysTime(new Date()), 1000);
        return () => clearInterval(timer);
      }, []);

      const [currentView, setCurrentView] = useState('home'); 
      const [currentUser, setCurrentUser] = useState(null); 

      // --- 狀態管理 (純單機記憶體) ---
      const [meetingInfo, setMeetingInfo] = useState({ name: '分層建築物所有人大會 (測試展示)', datetime: '2026年5月6日 下午 14:00', location: '本廈一樓大堂' });
      const [meetingStatus, setMeetingStatus] = useState('pending');
      const [units, setUnits] = useState(initialMockUnits);
      const [agendas, setAgendas] = useState(initialMockAgendas);
      const [votes, setVotes] = useState({});
      
      const [adminTab, setAdminTab] = useState('registry');
      const [userSelectedAgenda, setUserSelectedAgenda] = useState(null);
      
      // 首頁統一登入選單狀態
      const [loginSelectedTower, setLoginSelectedTower] = useState('ALL');
      const [loginSelectedUnit, setLoginSelectedUnit] = useState('');
      const [loginPin, setLoginPin] = useState('');
      const [loginError, setLoginError] = useState('');
      
      const [showReport, setShowReport] = useState(false); 
      const [showSignatureModal, setShowSignatureModal] = useState(false);
      const [showSignatureSheet, setShowSignatureSheet] = useState(false);
      const [showBallotSheet, setShowBallotSheet] = useState(false);
      const [printMode, setPrintMode] = useState('grouped');

      const [newUnitData, setNewUnitData] = useState({ tower: '', unit: '', owner: '', valuePercent: '' });
      const [newAgendaTitle, setNewAgendaTitle] = useState('');
      const [newAgendaType, setNewAgendaType] = useState('general_15');
      const [selectedTowerAttendance, setSelectedTowerAttendance] = useState('ALL');
      
      const fileInputRef = useRef(null);
      const agendaFileInputRef = useRef(null);

      // --- 計算屬性 ---
      const towerList = useMemo(() => {
        const towers = new Set(units.map(u => u.tower || '預設大廈'));
        return Array.from(towers).sort();
      }, [units]);

      const attendanceStats = useMemo(() => {
        let confirmedPercent = 0;
        let confirmedCount = 0;
        units.forEach(u => {
          if (u.isConfirmed && u.status !== 'absent') {
            confirmedCount++;
            confirmedPercent += u.valuePercent;
          }
        });
        return {
          confirmedCount,
          confirmedPercent: confirmedPercent.toFixed(2),
          canHoldMeeting: confirmedPercent >= 15 
        };
      }, [units]);

      const confirmedNonOwnerProxies = useMemo(() => {
        const proxies = [];
        const map = new Set();
        units.forEach(u => {
          if (u.status === 'proxy' && u.proxyType === 'non_owner' && u.isConfirmed && u.proxyNonOwner?.idCard) {
            if (!map.has(u.proxyNonOwner.idCard)) {
              map.add(u.proxyNonOwner.idCard);
              proxies.push(u.proxyNonOwner);
            }
          }
        });
        return proxies;
      }, [units]);

      const getAgendaStats = (agendaId) => {
        const agendaVotes = votes[agendaId] || {};
        const agendaDef = agendas.find(a => a.id === agendaId);
        if (!agendaDef) return null;

        let forPercent = 0, againstPercent = 0, abstainPercent = 0;
        units.filter(u => u.isConfirmed && u.status !== 'absent').forEach(u => {
          const v = agendaVotes[u.id];
          if (v === 'for') forPercent += u.valuePercent;
          else if (v === 'against') againstPercent += u.valuePercent;
          else if (v === 'abstain') abstainPercent += u.valuePercent;
        });

        let isPassed = false;
        if (agendaDef.type === 'general_15') isPassed = (forPercent > againstPercent) && (forPercent >= 15);
        else if (agendaDef.type === 'special_25') isPassed = (forPercent > againstPercent) && (forPercent >= 25);
        else if (agendaDef.type === 'special_50') isPassed = forPercent > 50;
        else if (agendaDef.type === 'special_66') isPassed = forPercent >= (200 / 3);

        return {
          forPercent: forPercent.toFixed(2),
          againstPercent: againstPercent.toFixed(2),
          abstainPercent: abstainPercent.toFixed(2),
          isPassed,
          rule: thresholdRules[agendaDef.type],
          status: agendaDef.status || 'pending'
        };
      };

      // 核心合併權限邏輯：找回同一人名下所有簽到單位與獲得授權的單位
      const controlledUnits = useMemo(() => {
        if (currentView !== 'user' || !currentUser) return [];
        
        if (currentUser.startsWith('PROXY_')) {
          // 非業主代理人
          const idCard = currentUser.replace('PROXY_', '');
          return units.filter(u => u.isConfirmed && u.status === 'proxy' && u.proxyType === 'non_owner' && u.proxyNonOwner?.idCard === idCard);
        } else {
          // 業主登入：自動抓取同名同姓且證件相同的其他親身出席單位
          const currentUnit = units.find(u => u.id === currentUser);
          if (!currentUnit) return [];
          
          const myOwnedUnitIds = units
              .filter(u => u.owner === currentUnit.owner && u.ownerIdCardLast4 === currentUnit.ownerIdCardLast4 && u.status === 'present')
              .map(u => u.id);
          
          return units.filter(u => {
            if (!u.isConfirmed) return false;
            // 1. 自己名下申報親身出席的所有單位
            if (myOwnedUnitIds.includes(u.id)) return true;
            // 2. 別人授權給自己名下任一單位的單位
            if (u.status === 'proxy' && u.proxyType === 'owner' && myOwnedUnitIds.includes(u.proxyToOwnerId)) return true;
            return false;
          });
        }
      }, [currentUser, units, currentView]);

      // --- 操作事件 ---
      const handleMeetingInfoChange = (field, value) => {
        setMeetingInfo({ ...meetingInfo, [field]: value });
      };

      const handleAgendaStatusChange = (agendaId, newStatus) => {
        const updates = { status: newStatus };
        if (newStatus === 'voting') updates.startTime = Date.now();
        setAgendas(prev => prev.map(a => a.id === agendaId ? { ...a, ...updates } : a));
      };

      const handleBackToHome = () => { 
        setCurrentView('home'); 
        setCurrentUser(null); 
        setShowReport(false); 
        setShowSignatureSheet(false); 
        setShowBallotSheet(false); 
        setLoginPin('');
        setLoginError('');
      };

      // 統一登入處理
      const handleUnifiedLoginSubmit = () => {
        if (!loginSelectedUnit) { setLoginError('請先選擇登入帳號。'); return; }

        if (loginSelectedUnit.startsWith('PROXY_')) {
          // 非業主代理人登入
          const idCard = loginSelectedUnit.replace('PROXY_', '');
          const proxy = confirmedNonOwnerProxies.find(p => p.idCard === idCard);
          if (!proxy) { setLoginError('找不到該代理人資料。'); return; }
          if (loginPin !== proxy.idCard.slice(-4)) { setLoginError('密碼錯誤，請聯絡管理人員。'); return; }
          
          setCurrentUser(`PROXY_${proxy.idCard}`); 
          setCurrentView('user');
          setUserSelectedAgenda(agendas[0]?.id);
          setLoginPin(''); setLoginError('');
        } else {
          // 業主登入
          const unit = units.find(u => u.id === loginSelectedUnit);
          if (!unit) { setLoginError('請先選擇登入帳號。'); return; }
          if (!unit.isConfirmed) { setLoginError('您的身份尚未經管委會核實，無法登入大會。'); return; }
          if (unit.status === 'proxy') { setLoginError('此單位已授權他人代理，業主本人無需登入。'); return; }
          if (unit.status === 'absent') { setLoginError('此單位登記為缺席，無法登入。'); return; }
          if (!unit.ownerIdCardLast4 || loginPin !== unit.ownerIdCardLast4) { setLoginError('密碼錯誤，請聯絡管理人員。'); return; }
          
          setCurrentUser(unit.id); 
          setCurrentView('user');
          setUserSelectedAgenda(agendas[0]?.id);
          setLoginPin(''); setLoginError('');
        }
      };

      const handleShowReport = () => {
        setMeetingStatus('ended');
        setTimeout(() => { setShowReport(true); }, 500);
      };

      const clearDatabase = () => {
        if(!confirm('警告：確定要清空所有資料嗎？')) return;
        setUnits([]); setAgendas([]); setVotes({}); setMeetingStatus('pending');
        alert("資料已清空！");
        setShowReport(false);
      };

      const handleAddUnit = () => {
        if (!newUnitData.unit) return;
        const newId = 'U' + Date.now();
        const data = { 
          id: newId,
          tower: newUnitData.tower || '預設大廈', unit: newUnitData.unit, owner: newUnitData.owner, valuePercent: parseFloat(newUnitData.valuePercent) || 0, 
          seqNo: '', isPriorityProxy: false, status: 'absent', proxyType: 'none', proxyToOwnerId: '', proxyNonOwner: { name: '', idCard: '', phone: '' }, isConfirmed: false, ownerIdCardLast4: '' 
        };
        setUnits(prev => [...prev, data]);
        setNewUnitData({ tower: '', unit: '', owner: '', valuePercent: '' });
      };

      const handleLoadMockData = () => {
        if(!confirm('這將清除現有資料，並重新載入 12 筆預設測試數據，確定執行嗎？')) return;
        setUnits(initialMockUnits);
        alert('預設測試數據 (共 12 筆，包含優先熱門人選，總份額 100%) 載入成功！');
      };

      const handleDeleteUnit = (id) => {
        setUnits(prev => prev.filter(u => u.id !== id));
      };

      const handleReassignSeqNos = () => {
        if(!confirm('這將根據「大廈」與「單位」順序重新編排所有簽到編號，確定執行？')) return;
        const grouped = {};
        units.forEach(u => {
            const t = u.tower || '預設大廈';
            if (!grouped[t]) grouped[t] = [];
            grouped[t].push(u);
        });
        const updatedUnits = [];
        Object.keys(grouped).sort().forEach(tower => {
            const sorted = grouped[tower].sort((a,b) => a.unit.localeCompare(b.unit, undefined, {numeric: true, sensitivity: 'base'}));
            sorted.forEach((u, i) => {
                const prefix = tower === '預設大廈' ? '' : tower + '-';
                const num = String(i + 1).padStart(3, '0');
                updatedUnits.push({ ...u, seqNo: prefix + num });
            });
        });
        setUnits(updatedUnits);
        alert("簽到編號已重新編排完成！");
      };

      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
          const text = evt.target.result;
          const rows = text.split('\n');
          const newUnits = [];
          rows.forEach((row, index) => {
            if (index === 0 || !row.trim()) return; 
            const cols = row.split(',').map(c => c.trim());
            let tower = '預設大廈', unit = '', owner = '', percent = 0;
            if (cols.length >= 4) { tower = cols[0] || '預設大廈'; unit = cols[1]; owner = cols[2]; percent = parseFloat(cols[3]); }
            else if (cols.length === 3) { unit = cols[0]; owner = cols[1]; percent = parseFloat(cols[2]); }
            else return;
            if (unit && owner) {
              newUnits.push({ id: 'U' + Date.now() + index, tower, unit, owner, valuePercent: percent || 0, seqNo: '', isPriorityProxy: false, status: 'absent', proxyType: 'none', proxyToOwnerId: '', proxyNonOwner: { name: '', idCard: '', phone: '' }, isConfirmed: false, ownerIdCardLast4: '' });
            }
          });
          if(newUnits.length > 0) {
            setUnits(prev => [...prev, ...newUnits]);
            alert(`成功匯入 ${newUnits.length} 筆業主資料！建議點擊「重新編排簽到編號」以生成編號。`);
          }
        };
        reader.readAsText(file);
        e.target.value = null; 
      };

      const handleUnitUpdate = (id, field, value) => {
        setUnits(prev => prev.map(u => {
          if (u.id === id) {
            const updated = { ...u, [field]: value };
            if (field === 'status') {
              updated.isConfirmed = false;
              if (value === 'absent') { updated.proxyType = 'none'; updated.ownerIdCardLast4 = ''; }
              else if (value === 'proxy' && updated.proxyType === 'none') { updated.proxyType = 'owner'; }
            }
            if (field === 'proxyType' || field === 'proxyToOwnerId') updated.isConfirmed = false;
            return updated;
          }
          return u;
        }));
      };

      const handleNonOwnerProxyUpdate = (id, field, value) => {
        setUnits(prev => prev.map(u => u.id === id ? { ...u, proxyNonOwner: { ...u.proxyNonOwner, [field]: value }, isConfirmed: false } : u));
      };

      // 批量確認同一人名下之單位身份 (並同步密碼)
      const handleConfirmIdentity = (unit) => {
        const newConfirmedState = !unit.isConfirmed;
        const sameOwnerUnits = units.filter(u => u.owner === unit.owner && u.id !== unit.id);
        let shouldSync = false;
        
        if (newConfirmedState && sameOwnerUnits.length > 0) {
            shouldSync = window.confirm(`發現業主「${unit.owner}」擁有多個單位（共 ${sameOwnerUnits.length + 1} 個），是否一併套用相同的簽到狀態與密碼設定？`);
        }

        setUnits(prev => prev.map(u => {
            if (u.id === unit.id) return { ...u, isConfirmed: newConfirmedState };
            if (shouldSync && sameOwnerUnits.find(su => su.id === u.id)) {
                return {
                    ...u,
                    status: unit.status,
                    proxyType: unit.proxyType,
                    proxyToOwnerId: unit.proxyToOwnerId,
                    proxyNonOwner: unit.proxyNonOwner,
                    ownerIdCardLast4: unit.ownerIdCardLast4,
                    isConfirmed: true
                };
            }
            return u;
        }));
      };

      const handleAddAgenda = () => {
        if (!newAgendaTitle.trim()) return;
        const newId = 'A' + Date.now();
        const data = { title: newAgendaTitle, type: newAgendaType, status: 'pending' };
        setAgendas(prev => [...prev, { id: newId, ...data }]);
        setNewAgendaTitle('');
      };

      const handleClearAgendas = () => {
        if(!confirm('警告：確定要清空所有議程嗎？此操作無法復原。')) return;
        setAgendas([]);
        alert("所有議程已清空！");
      };

      const handleAddDefaultAgendas = (type) => {
        const defaults = {
          'electronic': [{ title: '是否同意今次大會使用電子投票方式', type: 'general_15' }],
          'president': [{ title: '選舉大會主席', type: 'general_15' }],
          'first': [
            { title: '選舉大會主席', type: 'general_15' },
            { title: '討論及通過分層建築物規章', type: 'special_50' },
            { title: '選舉管理機關成員', type: 'general_15' },
            { title: '討論及通過本年度預算', type: 'general_15' },
            { title: '設立共同儲備基金及決定供款額', type: 'general_15' }
          ],
          'annual': [
            { title: '選舉大會主席', type: 'general_15' },
            { title: '討論及通過上年度管理機關的帳目報告', type: 'general_15' },
            { title: '討論及通過本年度預算', type: 'general_15' },
            { title: '選舉管理機關成員 (如任期屆滿)', type: 'general_15' }
          ]
        };
        const list = defaults[type];
        if (!list) return;

        const existingTitles = agendas.map(a => a.title);
        const itemsToAdd = list.filter(item => !existingTitles.includes(item.title));
        if (itemsToAdd.length === 0) return alert("所選的預設議程已經全部存在！");

        const newAgendas = itemsToAdd.map((item, index) => ({ id: 'A' + Date.now() + index, ...item, status: 'pending' }));
        setAgendas(prev => [...prev, ...newAgendas]);
        alert(`已成功載入 ${itemsToAdd.length} 項議程！`);
      };

      const handleAgendaFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
          const text = evt.target.result;
          const rows = text.split('\n');
          const newAgendas = [];
          rows.forEach((row, index) => {
            if (index === 0 || !row.trim()) return; 
            const cols = row.split(',');
            if (cols.length >= 1) {
              let type = cols[1] ? cols[1].trim() : '';
              if (type.includes('特別') || type.includes('25')) type = 'special_25';
              else if (type.includes('過半數') || type.includes('50')) type = 'special_50';
              else if (type.includes('更新') || type.includes('66') || type.includes('2/3')) type = 'special_66';
              else type = 'general_15';
              newAgendas.push({ id: 'A' + Date.now() + index, title: cols[0].trim(), type: type, status: 'pending' });
            }
          });
          if(newAgendas.length > 0) {
            setAgendas(prev => [...prev, ...newAgendas]);
            alert(`成功匯入 ${newAgendas.length} 筆議程！`);
          }
        };
        reader.readAsText(file);
        e.target.value = null; 
      };

      const handleVote = (agendaId, unitId, voteType) => {
        const agenda = agendas.find(a => a.id === agendaId);
        if (agenda.status !== 'voting' || meetingStatus !== 'started') {
            alert("此議程目前未開放投票！");
            return;
        }
        setVotes(prev => ({ ...prev, [agendaId]: { ...(prev[agendaId] || {}), [unitId]: voteType } }));
      };

      const TopNavBar = ({ title, subtitle, icon: IconComponent, showAdminStats }) => (
        <header className="bg-slate-800 text-white p-4 shadow-md sticky top-0 z-10 no-print">
          <div className="max-w-6xl mx-auto flex flex-wrap items-center justify-between gap-4">
            <div className="flex items-center gap-3">
              <IconComponent className="w-6 h-6 text-blue-400" />
              <div>
                <h1 className="text-lg font-bold">{title}</h1>
                <p className="text-xs text-slate-300">{subtitle}</p>
              </div>
            </div>
            <div className="flex items-center gap-4">
              {showAdminStats && (
                <div className="hidden md:block bg-slate-700 px-4 py-1.5 rounded-lg border border-slate-600 text-sm">
                  已確認出席：<span className={`text-lg font-bold ${attendanceStats.canHoldMeeting ? 'text-green-400' : 'text-red-400'}`}>{attendanceStats.confirmedPercent}%</span>
                </div>
              )}
              <button onClick={handleBackToHome} className="flex items-center gap-2 px-3 py-1.5 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm font-medium transition-colors border border-slate-600">
                <ArrowLeft className="w-4 h-4" /> 回首頁/登出
              </button>
            </div>
          </div>
        </header>
      );

      const ProgressBar = ({ forP, againstP, abstainP }) => (
        <div className="flex h-3 w-full bg-slate-200 rounded-full overflow-hidden mt-1">
          <div style={{ width: `${Math.min(forP, 100)}%` }} className="bg-green-500 transition-all"></div>
          <div style={{ width: `${Math.min(againstP, 100)}%` }} className="bg-red-500 transition-all"></div>
          <div style={{ width: `${Math.min(abstainP, 100)}%` }} className="bg-slate-400 transition-all"></div>
        </div>
      );

      // --- 視圖: 首項議程實體選票列印 (電子點票授權) ---
      if (showBallotSheet) {
        const sortedUnits = [...units].sort((a,b)=> (a.seqNo||'').localeCompare(b.seqNo||''));
        const chunkedUnits = [];
        for (let i = 0; i < sortedUnits.length; i += 4) {
           chunkedUnits.push(sortedUnits.slice(i, i + 4));
        }

        return (
          <div className="min-h-screen bg-white text-black p-8 font-serif">
             <div className="no-print mb-8 space-x-4 bg-slate-100 p-4 rounded-lg flex items-center shadow-sm">
               <button onClick={() => setShowBallotSheet(false)} className="bg-white border border-slate-300 px-5 py-2 rounded-lg font-bold hover:bg-slate-50 text-slate-700 mr-auto">取消返回</button>
               <button onClick={() => window.print()} className="bg-blue-600 text-white px-6 py-2.5 rounded-lg font-bold inline-flex items-center gap-2 hover:bg-blue-700 shadow-sm"><Printer className="w-5 h-5"/> 正式列印選票</button>
             </div>

             <div id="print-ballot-container">
               {chunkedUnits.map((chunk, pIdx) => (
                 <div key={pIdx} style={{ pageBreakAfter: 'always', height: '100vh' }} className="flex flex-col">
                   {chunk.map((u, i) => (
                     <div key={u.id} className={`flex-1 border-2 border-black p-6 rounded-xl flex flex-col justify-between ${i !== 3 ? 'mb-4' : ''}`}>
                       <div>
                         <div className="flex justify-between items-start border-b border-black pb-2 mb-4">
                           <h2 className="text-xl font-bold leading-tight">{meetingInfo.name || '分層建築物所有人大會'}<br/>【首項議程實體表決票】</h2>
                           <div className="text-right text-sm font-mono border border-black px-2 py-1 bg-gray-100">簽到編號: <strong>{u.seqNo || '待編排'}</strong></div>
                         </div>
                         <div className="flex justify-between items-center mb-4 bg-gray-50 p-2 border border-gray-300 rounded">
                           <p className="text-lg"><strong>單位：</strong> {u.tower} - {u.unit}</p>
                           <p className="text-lg"><strong>業權人：</strong> {u.owner}</p>
                           <p className="text-lg"><strong>法定份額：</strong> {u.valuePercent}%</p>
                         </div>
                         <div className="bg-blue-50 p-4 rounded-lg border border-blue-200">
                           <p className="font-bold text-lg mb-4 text-justify">議案：是否同意本次大會使用「電子點票系統」進行議程表決？</p>
                           <div className="flex justify-around mt-4 max-w-lg mx-auto">
                              <label className="flex items-center gap-3 text-xl font-bold"><div className="w-6 h-6 border-2 border-black"></div> 贊成</label>
                              <label className="flex items-center gap-3 text-xl font-bold"><div className="w-6 h-6 border-2 border-black"></div> 反對</label>
                              <label className="flex items-center gap-3 text-xl font-bold"><div className="w-6 h-6 border-2 border-black"></div> 棄權</label>
                           </div>
                         </div>
                       </div>
                       <div className="flex justify-between items-end mt-4">
                         <div className="text-sm text-gray-500">此選票僅供第一項議程紙本表決使用。</div>
                         <div className="w-64 text-center">
                           <div className="border-b border-black mb-2"></div>
                           <p className="text-sm">出席人 / 授權代理人簽署</p>
                         </div>
                       </div>
                     </div>
                   ))}
                 </div>
               ))}
             </div>
          </div>
        );
      }

      // --- 視圖: 實體簽到表列印 (含大會資訊) ---
      if (showSignatureSheet) {
        const groupedUnits = units.reduce((acc, u) => {
          const t = u.tower || '預設大廈';
          if (!acc[t]) acc[t] = [];
          acc[t].push(u);
          return acc;
        }, {});

        let printBlocks = [];
        if (printMode === 'all') {
            printBlocks.push({ title: '全體名冊', list: units.sort((a,b)=> (a.seqNo||'').localeCompare(b.seqNo||'')) });
        } else {
            Object.keys(groupedUnits).sort().forEach(tower => {
                printBlocks.push({ title: `【 ${tower} 】`, list: groupedUnits[tower].sort((a,b)=> (a.seqNo||'').localeCompare(b.seqNo||'')) });
            });
        }

        return (
          <div className="min-h-screen bg-white text-black p-8 font-serif">
             <div className="no-print mb-8 space-x-4 bg-slate-100 p-4 rounded-lg flex items-center shadow-sm">
               <button onClick={() => setShowSignatureSheet(false)} className="bg-white border border-slate-300 px-5 py-2 rounded-lg font-bold hover:bg-slate-50 text-slate-700 mr-auto">取消返回</button>
               <button onClick={() => window.print()} className="bg-blue-600 text-white px-6 py-2.5 rounded-lg font-bold inline-flex items-center gap-2 hover:bg-blue-700 shadow-sm"><Printer className="w-5 h-5"/> 正式列印</button>
             </div>

             <div id="print-signature-container">
               {printBlocks.map((block, tIdx) => (
                 <div key={block.title} style={{ pageBreakBefore: tIdx === 0 ? 'auto' : 'always' }} className="mb-12">
                   <div className="text-center mb-6">
                     <h1 className="text-3xl font-bold mb-3 border-b-2 border-black pb-2 inline-block px-10">{meetingInfo.name}</h1>
                     <p className="text-lg font-bold text-gray-700 mb-1">大會出席登記及簽到表</p>
                     <p className="text-sm text-gray-600">會議時間：{meetingInfo.datetime || '____年__月__日'} &nbsp; | &nbsp; 會議地點：{meetingInfo.location || '__________________'}</p>
                   </div>
                   <h2 className="text-xl font-bold text-center mb-4">{block.title}</h2>
                   <table className="w-full border-collapse border border-black text-sm">
                     <thead>
                       <tr className="bg-gray-100">
                         <th className="border border-black p-3 w-20">簽到編號</th>
                         <th className="border border-black p-3 w-24">單位</th>
                         <th className="border border-black p-3 w-32">業主姓名</th>
                         <th className="border border-black p-3 w-20">法定份額</th>
                         <th className="border border-black p-3 w-48">親身出席簽名區</th>
                         <th className="border border-black p-3 w-48">代理人簽名區<br/><span className="text-[10px] font-normal">(須附認筆跡授權書)</span></th>
                         <th className="border border-black p-3">備註</th>
                       </tr>
                     </thead>
                     <tbody>
                       {block.list.map(u => (
                         <tr key={u.id}>
                           <td className="border border-black p-2 text-center font-mono font-bold text-lg">{u.seqNo || '---'}</td>
                           <td className="border border-black p-2 font-bold text-center">{u.unit}</td>
                           <td className="border border-black p-2 text-center">{u.owner}</td>
                           <td className="border border-black p-2 text-center bg-gray-50">{u.valuePercent}%</td>
                           <td className="border border-black p-5"></td>
                           <td className="border border-black p-5"></td>
                           <td className="border border-black p-2"></td>
                         </tr>
                       ))}
                     </tbody>
                   </table>
                 </div>
               ))}
             </div>
          </div>
        );
      }

      // --- 視圖 1: 首頁 (登入介面) ---
      if (currentView === 'home') {
        return (
          <div className="min-h-screen bg-slate-100 flex flex-col items-center justify-center p-4">
            <div className="absolute top-4 right-4">
              <button onClick={() => setCurrentView('law')} className="flex items-center gap-2 bg-white text-blue-700 px-4 py-2 rounded-full shadow-sm font-bold border border-blue-200">
                <BookOpen className="w-5 h-5" /> 相關法律
              </button>
            </div>
            
            <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md my-8 border-t-4 border-blue-600">
              <div className="text-center mb-8">
                <div className="bg-blue-600 p-3 rounded-full inline-block mb-3 shadow-md"><Users className="w-8 h-8 text-white" /></div>
                <h1 className="text-2xl font-bold text-slate-800 leading-snug">{meetingInfo.name}</h1>
                <p className="text-slate-500 text-sm mt-2 font-bold bg-slate-100 py-1 rounded inline-block px-3">電子會議表決系統</p>
                <p className="text-xs text-amber-600 font-bold mt-3 border border-amber-200 bg-amber-50 py-1 px-3 rounded-full inline-block">● 目前為純前端單機展示版</p>
              </div>

              {/* 統一無差別登入區塊 */}
              <div className="space-y-5 animate-in fade-in">
                  {(towerList.length > 1 || confirmedNonOwnerProxies.length > 0) && (
                    <div>
                      <label className="block text-sm font-bold text-slate-700 mb-1.5">選擇大廈 / 類別</label>
                      <select 
                        value={loginSelectedTower} 
                        onChange={e => { setLoginSelectedTower(e.target.value); setLoginSelectedUnit(''); setLoginError(''); }} 
                        className="w-full border border-slate-300 p-3 rounded-xl outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 font-bold text-slate-700 bg-white"
                      >
                        <option value="ALL">顯示全部</option>
                        {towerList.map(t => <option key={t} value={t}>{t}</option>)}
                        {confirmedNonOwnerProxies.length > 0 && <option value="PROXY_GROUP">非業主代理人</option>}
                      </select>
                    </div>
                  )}
                  
                  <div>
                    <label className="block text-sm font-bold text-slate-700 mb-1.5">選擇登入帳號 (單位 / 代理人)</label>
                    <select 
                      value={loginSelectedUnit} 
                      onChange={e => { setLoginSelectedUnit(e.target.value); setLoginError(''); }} 
                      className="w-full border border-slate-300 p-3 rounded-xl outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 text-base font-bold text-blue-800 bg-blue-50"
                    >
                      <option value="">-- 請下拉選擇登入帳號 --</option>
                      
                      {/* 顯示業主單位 (隱藏姓名) */}
                      {loginSelectedTower !== 'PROXY_GROUP' && units
                        .filter(u => loginSelectedTower === 'ALL' || (u.tower || '預設大廈') === loginSelectedTower)
                        .sort((a,b)=> (a.seqNo||'').localeCompare(b.seqNo||''))
                        .map(u => <option key={u.id} value={u.id}>{u.tower && u.tower !== '預設大廈' ? `${u.tower} - ` : ''}{u.unit}</option>)}
                      
                      {/* 顯示非業主代理人 (隱藏證件號碼，顯示代表單位) */}
                      {(loginSelectedTower === 'ALL' || loginSelectedTower === 'PROXY_GROUP') && confirmedNonOwnerProxies.map(p => {
                         const repUnits = units.filter(u => u.status === 'proxy' && u.proxyType === 'non_owner' && u.proxyNonOwner?.idCard === p.idCard).map(u => u.unit).join(', ');
                         return <option key={`PROXY_${p.idCard}`} value={`PROXY_${p.idCard}`}>代理人 (代表單位: {repUnits})</option>
                      })}
                    </select>
                  </div>
                  
                  <div>
                    <label className="block text-sm font-bold text-slate-700 mb-1">登入密碼</label>
                    <p className="text-xs text-slate-500 mb-2">預設為證件後四位。如有問題，請聯絡管理人員。</p>
                    <input 
                      type="password" maxLength={4} 
                      value={loginPin} 
                      onChange={e => { setLoginPin(e.target.value.replace(/\D/g, '')); setLoginError(''); }} 
                      className="w-full text-center text-3xl tracking-[0.5em] font-mono py-3 border border-slate-300 rounded-xl outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition-all" 
                      placeholder="••••"

                  </div>
                  
                  {loginError && (
                    <div className="bg-red-50 text-red-600 text-sm p-3 rounded-lg border border-red-100 flex items-start gap-2">
                      <AlertCircle className="w-4 h-4 shrink-0 mt-0.5" />
                      <span className="font-bold">{loginError}</span>
                    </div>
                  )}
                  
                  <button 
                    onClick={handleUnifiedLoginSubmit} 
                    disabled={!loginSelectedUnit || loginPin.length !== 4} 
                    className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl shadow-md disabled:opacity-50 disabled:cursor-not-allowed transition-all text-lg"
                  >
                    登入大會
                  </button>
              </div>

              <div className="mt-8 pt-6 border-t border-slate-200">

                                <button onClick={()=>handleConfirmIdentity(u)} disabled={u.ownerIdCardLast4.length !== 4 || meetingStatus !== 'pending'} className={`px-2 py-2.5 rounded font-bold text-white text-sm w-full shadow-sm transition-all ${u.isConfirmed?'bg-green-600 hover:bg-green-700':'bg-amber-500 hover:bg-amber-600 disabled:opacity-50 disabled:cursor-not-allowed'}`}>
                                  {u.isConfirmed ? '✓ 已確認' : '確認身份'}
                                </button>
                              )}
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}

              {adminTab === 'agendas' && (
                <div className="bg-white p-6 rounded-lg shadow animate-in fade-in">
                  <h2 className="text-lg font-bold mb-4">大會議程設定</h2>
                  {meetingStatus === 'pending' && (
                    <>
                      <div className="flex flex-wrap items-center gap-2 mb-6 bg-white border border-slate-200 p-4 rounded-lg shadow-sm">
                        <p className="w-full font-bold text-sm text-slate-700 mb-2 border-b border-slate-100 pb-2">預設快速帶入</p>
                        <div className="w-full flex flex-wrap gap-2 mb-2">
                          <button onClick={() => handleAddDefaultAgendas('electronic')} className="bg-blue-50 text-blue-700 border border-blue-200 px-3 py-1.5 rounded text-sm font-bold hover:bg-blue-100 transition-colors">+ 加電子表決</button>
                          <button onClick={() => handleAddDefaultAgendas('president')} className="bg-blue-50 text-blue-700 border border-blue-200 px-3 py-1.5 rounded text-sm font-bold hover:bg-blue-100 transition-colors">+ 加選舉主席</button>
                          <button onClick={() => handleAddDefaultAgendas('first')} className="bg-purple-50 text-purple-700 border border-purple-200 px-3 py-1.5 rounded text-sm font-bold hover:bg-purple-100 transition-colors">載入【首次大會】法定議程</button>
                          <button onClick={() => handleAddDefaultAgendas('annual')} className="bg-purple-50 text-purple-700 border border-purple-200 px-3 py-1.5 rounded text-sm font-bold hover:bg-purple-100 transition-colors">載入【平常大會】法定議程</button>
                        </div>
                        <div className="w-full flex flex-wrap items-center gap-2 mt-2 pt-2 border-t border-slate-100">
                          <input type="file" accept=".csv" ref={agendaFileInputRef} onChange={handleAgendaFileUpload} className="hidden" />
                          <button onClick={() => agendaFileInputRef.current.click()} className="bg-green-50 text-green-700 border border-green-200 px-3 py-1.5 rounded text-sm font-bold hover:bg-green-100 transition-colors flex items-center gap-1"><FileSpreadsheet className="w-4 h-4"/> 批量匯入CSV</button>
                          <button onClick={handleClearAgendas} className="bg-red-50 text-red-700 border border-red-200 px-3 py-1.5 rounded text-sm font-bold hover:bg-red-100 transition-colors flex items-center gap-1 ml-auto"><Trash2 className="w-4 h-4"/> 重新設置議程 (清空)</button>
                        </div>
                      </div>

                      <div className="flex flex-wrap items-center gap-3 mb-6 bg-slate-50 p-4 rounded border border-slate-200">
                        <p className="w-full font-bold text-sm text-slate-700 mb-1">手動單筆新增</p>
                        <input type="text" placeholder="輸入議程題目..." value={newAgendaTitle} onChange={e=>setNewAgendaTitle(e.target.value)} className="flex-1 min-w-[200px] border p-2 rounded outline-none focus:border-blue-500" />
                        <select value={newAgendaType} onChange={e=>setNewAgendaType(e.target.value)} className="border p-2 rounded bg-white outline-none">
                          {Object.entries(thresholdRules).map(([key, rule]) => <option key={key} value={key}>{rule.label} - {rule.desc}</option>)}
                        </select>
                        <button onClick={handleAddAgenda} className="bg-blue-600 text-white px-5 py-2 rounded font-bold hover:bg-blue-700">加入</button>
                      </div>
                    </>
                  )}
                  <div className="space-y-3">
                    {agendas.length === 0 && <p className="text-center text-slate-400 py-6 border rounded-lg border-dashed">目前尚未設定任何議程</p>}
                    {agendas.map((a, i) => (
                      <div key={a.id} className="p-4 border rounded-lg bg-white shadow-sm flex items-start gap-3">
                         <div className="bg-blue-100 text-blue-800 font-bold px-3 py-1 rounded">{i+1}</div>
                         <div>
                            <h4 className="font-bold text-slate-800 text-lg">{a.title}</h4>
                            <p className="text-sm text-blue-700 mt-1 bg-blue-50 px-2 py-0.5 rounded border border-blue-100 inline-block">{thresholdRules[a.type].label}: {thresholdRules[a.type].desc}</p>
                         </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {adminTab === 'dashboard' && (
                <div className="bg-white p-6 rounded-lg shadow animate-in fade-in">
                  <div className="flex flex-col md:flex-row justify-between items-center mb-6 gap-4 border-b pb-4">
                    <h2 className="text-xl font-bold">會議控制與即時點票</h2>
                    {meetingStatus === 'pending' && <button onClick={()=>setMeetingStatus('started')} disabled={!attendanceStats.canHoldMeeting} className="bg-green-600 hover:bg-green-700 text-white px-6 py-2.5 rounded-lg font-bold disabled:opacity-50 disabled:cursor-not-allowed shadow-sm flex items-center gap-2"><Play className="w-5 h-5"/> 大會正式開始 (鎖定名冊)</button>}
                    {meetingStatus === 'started' && <button onClick={handleShowReport} className="bg-red-600 hover:bg-red-700 text-white px-6 py-2.5 rounded-lg font-bold shadow-sm flex items-center gap-2"><Square className="w-5 h-5"/> 結束所有議程並生成報告</button>}
                  </div>
                  
                  {meetingStatus === 'pending' && !attendanceStats.canHoldMeeting && (
                      <div className="bg-red-50 border border-red-200 text-red-800 p-4 rounded-lg text-sm mb-6 flex gap-3">
                          <AlertCircle className="w-6 h-6 shrink-0 mt-0.5" />
                          <div><p className="font-bold">警告：流會防護機制生效</p><p>目前已確認出席份額 ({attendanceStats.confirmedPercent}%) 未達最低法定要求 (15%)，無法召開大會。</p></div>
                      </div>
                  )}

                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    {agendas.map(a => {
                      const stats = getAgendaStats(a.id);
                      return (
                        <div key={a.id} className="border p-5 rounded-xl bg-slate-50 shadow-sm relative overflow-hidden">
                          {stats.status === 'voting' && <div className="absolute top-0 left-0 w-full h-1 bg-blue-500 animate-pulse"></div>}
                          
                          <div className="flex justify-between items-start mb-2">
                             <h3 className="font-bold text-lg pr-4">{a.title}</h3>
                             {stats.status === 'voting' && <div className="bg-blue-100 text-blue-700 font-mono text-sm px-2 py-1 rounded font-bold flex items-center gap-1 border border-blue-200"><Clock className="w-3.5 h-3.5"/> <LiveTimer startTime={a.startTime} /></div>}
                             {stats.status === 'ended' && <div className="bg-slate-200 text-slate-600 text-xs px-2 py-1 rounded font-bold border border-slate-300">表決結束</div>}
                          </div>
                          <p className="text-xs text-slate-500 mb-4 bg-white p-2 border rounded"><strong>要求：</strong>{stats.rule.desc}</p>
                          
                          <div className="space-y-2 mb-4 bg-white p-4 rounded-lg border">
                            <div className="flex justify-between text-sm font-bold">
                              <span className="text-green-700">贊成 {stats.forPercent}%</span><span className="text-red-700">反對 {stats.againstPercent}%</span><span className="text-slate-500">棄權 {stats.abstainPercent}%</span>
                            </div>
                            <ProgressBar forP={stats.forPercent} againstP={stats.againstPercent} abstainP={stats.abstainPercent} />
                          </div>

                          {/* 單獨議程控制按鈕 (僅在會議開始後顯示) */}
                          {meetingStatus === 'started' && (
                              <div className="flex gap-2 mb-3">
                                  {stats.status === 'pending' && <button onClick={()=>handleAgendaStatusChange(a.id, 'voting')} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded shadow-sm text-sm">開放此議案投票</button>}
                                  {stats.status === 'voting' && <button onClick={()=>handleAgendaStatusChange(a.id, 'ended')} className="w-full bg-amber-500 hover:bg-amber-600 text-white font-bold py-2 rounded shadow-sm text-sm">停止計時並結束投票</button>}
                              </div>
                          )}

                          {stats.status === 'ended' && (
                            <div className={`p-2 rounded-lg text-center font-bold text-sm flex justify-center items-center gap-2 border ${stats.isPassed ? 'bg-green-100 text-green-800 border-green-300' : 'bg-slate-200 text-slate-600 border-slate-300'}`}>
                              {stats.isPassed ? <CheckCircle className="w-4 h-4" /> : <XCircle className="w-4 h-4" />}
                              {stats.isPassed ? '大會結果：已達法定通過門檻' : '大會結果：未達法定門檻'}
                            </div>
                          )}
                        </div>
                      )
                    })}
                  </div>
                </div>
              )}
            </div>
            
            {/* 列印設定 Modal */}
            {showSignatureModal && (
              <div className="fixed inset-0 bg-slate-900/60 flex items-center justify-center z-50 p-4 animate-in fade-in">
                <div className="bg-white rounded-xl shadow-2xl p-6 w-full max-w-sm">
                  <h2 className="text-xl font-bold text-slate-800 mb-4 border-b pb-2">簽到表列印設定</h2>
                  <div className="mb-6 space-y-4">
                     <p className="text-sm text-slate-600">請選擇實體簽到表的列印分頁模式：</p>
                     <label className="flex items-start gap-3 p-3 border rounded-lg cursor-pointer hover:bg-slate-50">
                        <input type="radio" name="printMode" value="grouped" checked={printMode==='grouped'} onChange={()=>setPrintMode('grouped')} className="mt-1"/>
                        <div><p className="font-bold text-slate-800">按座數/大廈分頁列印</p><p className="text-xs text-slate-500">適合設有多個報到櫃檯的大型屋苑。</p></div>
                     </label>
                     <label className="flex items-start gap-3 p-3 border rounded-lg cursor-pointer hover:bg-slate-50">
                        <input type="radio" name="printMode" value="all" checked={printMode==='all'} onChange={()=>setPrintMode('all')} className="mt-1"/>
                        <div><p className="font-bold text-slate-800">不分座數連續列印</p><p className="text-xs text-slate-500">所有名單會連續列印在一份表格中。</p></div>
                     </label>
                  </div>
                  <div className="flex gap-3">
                    <button onClick={() => setShowSignatureModal(false)} className="flex-1 py-2.5 bg-slate-100 rounded-lg font-bold text-slate-600 hover:bg-slate-200">取消</button>
                    <button onClick={() => { setShowSignatureModal(false); setShowSignatureSheet(true); }} className="flex-1 py-2.5 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 flex justify-center items-center gap-2"><Printer className="w-4 h-4"/> 產生簽到表</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      }

      // --- 視圖 5: 業主投票區 ---
      if (currentView === 'user' && currentUser) {
        const isNonOwnerProxy = currentUser.startsWith('PROXY_');
        const proxyData = isNonOwnerProxy ? confirmedNonOwnerProxies.find(p => p.idCard === currentUser.replace('PROXY_', '')) : null;
        const myUnit = !isNonOwnerProxy ? units.find(u => u.id === currentUser) : null;
        
        return (
          <div className="min-h-screen bg-slate-50 pb-10">
            <TopNavBar 
              title={isNonOwnerProxy ? `非業主代理人專區` : `${myUnit.unit} 業主專區`} 
              subtitle={`歡迎，${isNonOwnerProxy ? proxyData.name : myUnit.owner}`} 
              icon={isNonOwnerProxy ? UserSquare2 : Users} 
              showAdminStats={false} 
            />
            <div className="max-w-3xl mx-auto mt-6 px-4">
              <div className="bg-white p-6 rounded-xl shadow-sm mb-6 text-center border-t-4 border-blue-600 flex flex-col md:flex-row items-center justify-between gap-4">
                <div className="text-left w-full md:w-auto">
                   <h2 className="text-xl font-bold text-slate-800 mb-1">{meetingInfo.name}</h2>
                   <p className="text-sm font-bold text-slate-500 bg-slate-100 px-3 py-1 rounded-full inline-block">歡迎，{isNonOwnerProxy ? proxyData.name : myUnit.owner}</p>
                </div>
                <div className="w-full md:w-auto bg-blue-50 border border-blue-100 rounded-xl p-4">
                   <p className="text-blue-800 font-bold text-sm mb-1">您控制的總投票份額：</p>
                   <div className="flex items-baseline justify-center md:justify-start gap-1">
                     <p className="text-3xl font-black text-blue-700">
                       {controlledUnits.reduce((acc, u) => acc + u.valuePercent, 0).toFixed(2)}
                     </p>
                     <span className="text-blue-600 font-bold text-xl">%</span>
                   </div>
                   <p className="text-xs text-blue-600 mt-1 font-medium bg-blue-100 inline-block px-2 py-0.5 rounded">
                     代表 {controlledUnits.length} 個單位 (包含授權)
                   </p>
                </div>
              </div>

              {meetingStatus !== 'started' && (
                <div className="bg-amber-50 p-8 text-center rounded-xl border border-amber-200 text-amber-800 shadow-sm">
                  <ClipboardCheck className="w-12 h-12 mx-auto mb-3 opacity-40" />
                  <h3 className="text-lg font-bold mb-2">大會尚未正式開始</h3>
                  <p className="text-sm max-w-md mx-auto leading-relaxed">管委會正在進行核對或主席尚未宣佈開會。請等待大會主席宣佈「開放投票」後，方可進行表決。</p>
                </div>
              )}

              {meetingStatus === 'started' && (
                <>
                  <div className="bg-amber-50 border border-amber-200 text-amber-800 p-4 rounded-xl text-sm mb-6 flex gap-3 shadow-sm">
                    <AlertCircle className="w-6 h-6 shrink-0 mt-0.5" />
                    <div>
                      <p className="font-bold mb-1 text-base">【依法行使表決權須知】</p>
                      <p className="leading-relaxed">您的選票將按所佔樓宇份額加權計算，並直接影響大會決議是否達法定門檻。請等待主席宣佈各項議程「開放投票」後再進行作答。</p>
                    </div>
                  </div>

                  {agendas.map((agenda, idx) => {
                    const stats = getAgendaStats(agenda.id);
                    const isVoting = stats.status === 'voting';
                    const isEnded = stats.status === 'ended';

                    return (
                      <div key={agenda.id} className={`bg-white border rounded-xl shadow-md overflow-hidden mb-6 transition-all ${isVoting ? 'ring-2 ring-blue-500 transform scale-[1.01]' : isEnded ? 'opacity-80' : ''}`}>
                        <div className="bg-slate-50 p-5 border-b relative">
                          {isVoting && <span className="absolute top-4 right-4 flex h-3 w-3"><span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span><span className="relative inline-flex rounded-full h-3 w-3 bg-blue-500"></span></span>}
                          <div className="flex justify-between items-center mb-1">
                             <div className="font-bold text-xs text-blue-600">議程 {idx + 1}</div>
                             <div className={`text-xs font-bold px-2 py-0.5 rounded border ${isVoting ? 'bg-blue-100 text-blue-700 border-blue-200' : isEnded ? 'bg-slate-200 text-slate-600 border-slate-300' : 'bg-amber-50 text-amber-600 border-amber-200'}`}>
                               {isVoting ? '開放投票中' : isEnded ? '表決已結束' : '等待表決'}
                             </div>
                          </div>
                          <h2 className="text-xl font-bold text-slate-800 pr-8 leading-snug">{agenda.title}</h2>
                        </div>
                        <div className="p-5 space-y-4">
                          {controlledUnits.map(unit => {
                            const currentVote = votes[agenda.id]?.[unit.id];
                            const isSelf = !isNonOwnerProxy && unit.id === currentUser;
                            
                            return (
                              <div key={unit.id} className={`flex flex-col md:flex-row md:items-center justify-between p-4 rounded-lg border gap-4 transition-colors ${isVoting ? 'bg-white hover:border-blue-300 border-slate-200' : 'bg-slate-50 border-slate-200'}`}>
                                <div className={!isVoting && !currentVote ? "opacity-60" : ""}>
                                  <div className="font-bold text-slate-800 text-lg">
                                    {unit.unit} {unit.owner}
                                    {!isSelf && <span className="ml-2 text-xs bg-purple-200 text-purple-800 px-2 py-0.5 rounded-full relative -top-0.5">代投</span>}
                                  </div>
                                  <div className="text-sm text-slate-500 mt-0.5 font-mono bg-slate-100 inline-block px-1.5 py-0.5 rounded border border-slate-200">
                                    份額: {unit.valuePercent}%
                                  </div>
                                </div>
                                <div className="flex gap-2 w-full md:w-auto">
                                  <button onClick={() => handleVote(agenda.id, unit.id, 'for')} disabled={!isVoting} className={`flex-1 md:w-24 py-2.5 rounded-lg font-bold border transition-colors shadow-sm disabled:opacity-50 disabled:cursor-not-allowed ${currentVote==='for'?'bg-green-600 text-white border-green-600 transform scale-105':'bg-white text-slate-600 hover:bg-green-50 hover:text-green-700 hover:border-green-300'}`}>贊成</button>
                                  <button onClick={() => handleVote(agenda.id, unit.id, 'against')} disabled={!isVoting} className={`flex-1 md:w-24 py-2.5 rounded-lg font-bold border transition-colors shadow-sm disabled:opacity-50 disabled:cursor-not-allowed ${currentVote==='against'?'bg-red-600 text-white border-red-600 transform scale-105':'bg-white text-slate-600 hover:bg-red-50 hover:text-red-700 hover:border-red-300'}`}>反對</button>
                                  <button onClick={() => handleVote(agenda.id, unit.id, 'abstain')} disabled={!isVoting} className={`flex-1 md:w-24 py-2.5 rounded-lg font-bold border transition-colors shadow-sm disabled:opacity-50 disabled:cursor-not-allowed ${currentVote==='abstain'?'bg-slate-600 text-white border-slate-600 transform scale-105':'bg-white text-slate-600 hover:bg-slate-100 hover:text-slate-800 hover:border-slate-400'}`}>棄權</button>
                                </div>
                              </div>
                            )
                          })}
                        </div>
                        <div className="bg-slate-50 p-6 border-t border-slate-200">
                          <h3 className="font-bold text-slate-700 mb-4 flex items-center gap-2">
                            <BarChart3 className="w-5 h-5 text-blue-600" /> 全場實時點票概況
                          </h3>
                          <div className="bg-white p-4 rounded-xl border border-slate-100">
                            <div className="flex justify-between text-sm mb-2 font-bold">
                              <span className="text-green-700">贊成: {stats.forPercent}%</span>
                              <span className="text-red-700">反對: {stats.againstPercent}%</span>
                            </div>
                            <ProgressBar forP={stats.forPercent} againstP={stats.againstPercent} abstainP={stats.abstainPercent} />
                          </div>
                          
                          <div className={`mt-5 p-3 rounded-lg text-center font-bold text-sm flex justify-center items-center gap-2 border ${stats.isPassed ? 'bg-green-100 text-green-800 border-green-300' : 'bg-slate-200 text-slate-600 border-slate-300'}`}>
                            {stats.isPassed ? <CheckCircle className="w-5 h-5" /> : <XCircle className="w-5 h-5" />}
                            {stats.isPassed ? '預測：目前票數已達法定通過要求' : '預測：目前票數未達法定要求'}
                          </div>
                        </div>
                      </div>
                    )
                  })}
                </>
              )}
            </div>
          </div>
        );
      }

      return null;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MacauCondoMeeting />);
  </script>
</body>
</html>
